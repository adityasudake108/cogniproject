spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/healthnet?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: 8080

# JWT configuration
# jwt.secret must be a base64-encoded string of at least 256 bits (32 bytes)
# Override in production via the JWT_SECRET environment variable
jwt:
  secret: ${JWT_SECRET:dGhpcyBpcyBhIHNlY3VyZSBzZWNyZXQga2V5IGZvciBqd3Qgc2lnbmluZyE=}
  expiration: ${JWT_EXPIRATION:86400000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
